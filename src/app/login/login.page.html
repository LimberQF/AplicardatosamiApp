<ion-header>
  <ion-toolbar color="dark">
    <ion-title>Autenticación de Operario</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content color="light" class="ion-padding">

  <div style="text-align: center; margin-top: 15%; margin-bottom: 10%;">
    <ion-icon name="cube-outline" color="primary" style="font-size: 100px;"></ion-icon>
    <h1 style="color: #222428; font-weight: bold;">Terminal Logística</h1>
    <p style="color: #666;">Control de Bodega y Transporte</p>
  </div>

  <ion-card>
    <ion-card-content>


      <ion-item lines="full">
        <ion-icon name="person-outline" slot="start" color="medium"></ion-icon>
        <ion-input
          placeholder="Nombre de usuario"
          [(ngModel)]="usuario"
          type="text">
        </ion-input>
      </ion-item>

      <ion-item lines="full">
        <ion-icon name="lock-closed-outline" slot="start" color="medium"></ion-icon>
        <ion-input
          placeholder="Contraseña"
          [(ngModel)]="password"
          type="password">
        </ion-input>
      </ion-item>

      <ion-button expand="block" shape="round" color="primary" (click)="login()" style="margin-top: 30px;">
        <ion-icon name="log-in-outline" slot="start"></ion-icon>
        Iniciar Turno
      </ion-button>

    </ion-card-content>
  </ion-card>

</ion-content>
